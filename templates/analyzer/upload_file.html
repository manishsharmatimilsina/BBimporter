{% extends 'base.html' %}

{% block title %}Upload Files{% endblock %}

{% block content %}
<h1>Upload Files - Session {{ session.session_id }}</h1>

<form method="post" enctype="multipart/form-data" style="max-width: 600px;">
    {% csrf_token %}
    <div class="form-group">
        <label for="file_type">File Type:</label>
        <select id="file_type" name="file_type" required>
            <option value="">-- Select File Type --</option>
            <option value="benevity">Benevity</option>
            <option value="fup">FUP Raw</option>
            <option value="paypal">PayPal</option>
            <option value="stripe">Stripe</option>
            <option value="globalgiving">GlobalGiving</option>
            <option value="bb">BB Import</option>
        </select>
    </div>

    <div class="form-group">
        <label for="file">Select File (CSV or Excel):</label>
        <input type="file" id="file" name="file" accept=".csv,.xlsx,.xls" required>
    </div>

    <button type="submit" class="btn">Upload File</button>
</form>

<p style="margin-top: 1rem;"><a href="{% url 'analyzer:session_detail' session.pk %}">Back to Session</a></p>
{% endblock %}
