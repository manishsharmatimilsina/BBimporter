name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build and push Docker image
      env:
        REGISTRY: docker.io
        IMAGE_NAME: unmatched-donors
        IMAGE_TAG: latest
      run: |
        echo "Building Docker image..."
        docker build -t $REGISTRY/${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$IMAGE_TAG .

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push to Docker Hub
      run: |
        docker push docker.io/${{ secrets.DOCKER_USERNAME }}/unmatched-donors:latest

    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /app/unmatched-donors-django
          git pull origin main
          docker-compose pull
          docker-compose up -d
          docker-compose exec -T web python manage.py migrate
          docker-compose exec -T web python manage.py collectstatic --noinput
          echo "Deployment completed successfully!"

    - name: Notify deployment
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: 'Deployment to production completed successfully!',
            attachments: [{
              color: 'good',
              title: 'Unmatched Donors - Production Deployment',
              fields: [{
                title: 'Commit',
                value: context.payload.head_commit.message,
                short: false
              }]
            }]
          }
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

    - name: Notify failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: 'Deployment to production failed!',
            attachments: [{
              color: 'danger',
              title: 'Unmatched Donors - Deployment Failed'
            }]
          }
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
